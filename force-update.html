<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Paris-App aktualisieren</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(145deg,#fff5f7,#f3f8fa);min-height:100vh;margin:0;display:grid;place-items:center;color:#334b5f}.card{width:min(88vw,430px);padding:30px;border-radius:28px;background:#fff;box-shadow:0 20px 60px rgba(65,45,58,.14);text-align:center}h1{font-family:Georgia,serif;font-size:32px;margin:0 0 12px}.dot{width:16px;height:16px;border-radius:50%;background:#63c49c;margin:20px auto;box-shadow:0 0 0 8px rgba(99,196,156,.15)}p{line-height:1.55;color:#718090}</style>
</head>
<body><main class="card"><div class="dot"></div><h1>Paris-App wird aktualisiert</h1><p id="status">Alter App-Cache wird entfernt …</p></main>
<script>
(async()=>{const status=document.getElementById('status');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}Object.keys(localStorage).filter(k=>k.startsWith('paris-active-build')).forEach(k=>localStorage.removeItem(k));status.textContent='Fertig. Die neue Version wird geöffnet …';setTimeout(()=>location.replace('./index.html?appv=paris-20260723-reminders-mobile-reset-1'),700)}catch(e){status.textContent='Bitte die App vollständig schließen und erneut öffnen.'}})();
</script></body></html>
